<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AppLink — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0A;color:#F5F5F7;font-family:'Satoshi',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}

/* canvas */
.auth-canvas{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;position:relative}
.auth-canvas::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 720px 480px at 50% 38%,rgba(191,255,0,0.045) 0%,transparent 70%);pointer-events:none}

/* card */
.auth-card{width:100%;max-width:440px;background:#141414;border:1px solid rgba(255,255,255,0.04);border-radius:28px;padding:40px;
  box-shadow:16px 16px 40px rgba(0,0,0,0.7),-8px -8px 20px rgba(255,255,255,0.025),0 0 60px rgba(191,255,0,0.07);
  position:relative;z-index:1}

/* logo mark */

/* type */
.auth-title{font-family:'General Sans',sans-serif;font-weight:600;font-size:28px;line-height:1.05;letter-spacing:-0.03em;color:#fff;margin-bottom:8px}
.auth-sub{font-family:'Satoshi',sans-serif;font-size:15px;color:#94A3B8;line-height:1.55;margin-bottom:28px}

/* floating label */
.fl{position:relative;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:14px;
  box-shadow:inset 4px 4px 8px rgba(0,0,0,0.55),inset -2px -2px 6px rgba(255,255,255,0.025);
  transition:.35s cubic-bezier(0.34,1.56,0.64,1)}
.fl input{width:100%;background:transparent;border:0;outline:none;padding:22px 18px 12px;color:#fff;
  font-family:'Satoshi',sans-serif;font-size:15px;font-weight:500}
.fl input[type="password"]{padding-right:50px}
.fl label{position:absolute;top:1.05rem;left:1.2rem;color:#94A3B8;font-family:'Satoshi',sans-serif;font-size:15px;
  transition:.35s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none}
.fl input:not(:placeholder-shown)~label,
.fl:focus-within label{top:-0.5rem;left:1rem;transform:scale(0.65);color:#BFFF00;
  font-weight:700;text-transform:uppercase;letter-spacing:0.12em;background:#141414;padding:0 8px;border-radius:4px}
.fl:focus-within{border-color:rgba(191,255,0,0.5)}
.fl-wrap{margin-bottom:14px}

/* eye toggle */
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:0;
  cursor:pointer;color:#5A5A60;padding:4px;transition:.2s;display:grid;place-items:center}
.pw-eye:hover{color:#94A3B8}
.pw-eye svg{width:16px;height:16px;display:block}

/* forgot */
.forgot-link{display:block;text-align:right;font-family:'Satoshi',sans-serif;font-size:13px;font-weight:700;
  color:#FF7777;text-decoration:none;text-transform:uppercase;letter-spacing:0.12em;margin-top:6px;
  transition:color .2s}
.forgot-link:hover{color:#BFFF00}

/* checkbox */
.check-row{display:flex;align-items:center;gap:10px;margin:6px 0 22px}
.v3check{width:20px;height:20px;border-radius:6px;background:#1A1A1A;display:inline-grid;place-items:center;
  cursor:pointer;flex-shrink:0;box-shadow:inset 3px 3px 6px rgba(0,0,0,0.55),inset -1px -1px 3px rgba(255,255,255,0.025);
  transition:.3s cubic-bezier(0.34,1.56,0.64,1)}
.v3check svg{width:11px;height:11px;color:#0A0A0A;opacity:0}
.v3check.on{background:linear-gradient(135deg,#BFFF00,#FF7777);box-shadow:0 0 12px rgba(191,255,0,0.45),2px 2px 6px rgba(0,0,0,0.4)}
.v3check.on svg{opacity:1}
.check-label{font-family:'Satoshi',sans-serif;font-size:14.5px;color:#94A3B8}

/* primary button */
.btn-primary{width:100%;background:linear-gradient(90deg,#BFFF00,#FF7777);color:#0A0A0A;border:0;
  padding:16px;border-radius:14px;font-family:'Satoshi',sans-serif;font-weight:800;
  font-size:14px;text-transform:uppercase;letter-spacing:0.14em;cursor:pointer;
  box-shadow:4px 4px 10px rgba(0,0,0,0.5),0 0 28px rgba(191,255,0,0.35);
  transition:.35s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;justify-content:center;gap:10px}
.btn-primary:hover{transform:scale(1.03);box-shadow:4px 4px 14px rgba(0,0,0,0.55),0 0 36px rgba(191,255,0,0.45)}
.btn-primary svg{width:16px;height:16px}

/* OR divider */
.or-div{display:flex;align-items:center;gap:12px;color:#5A5A60;font-family:'Satoshi',sans-serif;
  font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;margin:22px 0}
.or-div::before,.or-div::after{content:"";flex:1;height:1px;background:rgba(255,255,255,0.06)}

/* OAuth buttons */
.oauth-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.btn-oauth{background:#1A1A1A;color:#E2E8F0;border:1px solid rgba(255,255,255,0.06);
  padding:14px;border-radius:14px;font-family:'Satoshi',sans-serif;font-weight:700;
  font-size:13.5px;text-transform:uppercase;letter-spacing:0.14em;cursor:pointer;
  box-shadow:3px 3px 8px rgba(0,0,0,0.5),-1px -1px 4px rgba(255,255,255,0.025);
  transition:.35s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-oauth:hover{color:#fff;background:#222;border-color:rgba(255,255,255,0.1)}
.btn-oauth svg{flex-shrink:0}

/* AppexCRM button */
.btn-appex{width:100%;background:#141414;color:#BFFF00;border:1px solid rgba(191,255,0,0.18);
  padding:14px;border-radius:14px;font-family:'Satoshi',sans-serif;font-weight:800;
  font-size:13.5px;text-transform:uppercase;letter-spacing:0.12em;cursor:pointer;
  box-shadow:3px 3px 8px rgba(0,0,0,0.5),-1px -1px 4px rgba(255,255,255,0.025),inset 0 0 24px rgba(191,255,0,0.03);
  transition:.35s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;justify-content:center;gap:10px}
.btn-appex:hover{border-color:rgba(191,255,0,0.4);background:#181818}
.btn-appex svg{width:16px;height:16px}
.appex-note{text-align:center;font-size:13px;color:#5A5A60;margin-top:8px;font-family:'Satoshi',sans-serif;line-height:1.5}

/* switch */
.auth-switch{text-align:center;margin-top:22px;font-family:'Satoshi',sans-serif;font-size:14.5px;color:#5A5A60}
.auth-switch a{color:#BFFF00;font-weight:700;text-decoration:none;transition:color .2s}
.auth-switch a:hover{color:#FF7777}

/* copyright */
.auth-copy{font-family:'Satoshi',sans-serif;font-size:13px;color:#3A3A40;letter-spacing:0.1em;
  margin-top:28px;position:relative;z-index:1}
</style>
</head>
<body>
<div class="auth-canvas">
  <div class="auth-card">

    <!-- Logo mark -->
    <h1 class="auth-title">Entrar no AppLink</h1>
    <p class="auth-sub">Gerencie seus smart links, smartpages e pixels em um só lugar.</p>

    <!-- E-mail -->
    <div class="fl-wrap">
      <div class="fl">
        <input type="email" placeholder=" " value="maria@empresa.com">
        <label>E-mail</label>
      </div>
    </div>

    <!-- Senha -->
    <div class="fl-wrap">
      <div class="fl" style="position:relative">
        <input type="password" placeholder=" " value="senhasegura" id="pw-field">
        <label>Senha</label>
        <button class="pw-eye" onclick="var f=document.getElementById('pw-field');f.type=f.type==='password'?'text':'password'" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <a href="#" class="forgot-link">Esqueci a senha</a>
    </div>

    <!-- Manter conectado -->
    <div class="check-row">
      <span class="v3check on">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M20 6L9 17l-5-5"/></svg>
      </span>
      <span class="check-label">Manter conectado</span>
    </div>

    <!-- CTA -->
    <button class="btn-primary">
      Entrar
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>

    <!-- OR -->
    <div class="or-div">ou continue com</div>

    <!-- Google + Microsoft -->
    <div class="oauth-row">
      <button class="btn-oauth">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
      <button class="btn-oauth">
        <svg width="18" height="18" viewBox="0 0 21 21">
          <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/>
          <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
        </svg>
        Microsoft
      </button>
    </div>

    <!-- AppexCRM -->
    <button class="btn-appex">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6">
        <path d="M13 2 3 14h9l-1 8 10-12h-9z"/>
      </svg>
      Entrar com AppexCRM
    </button>
    <p class="appex-note">Sua conta AppexCRM funciona aqui — identidade unificada.</p>

    <!-- Switch -->
    <div class="auth-switch">
      Novo por aqui? <a href="05-signup.html">Criar conta grátis</a>
    </div>
  </div>

  <span class="auth-copy">© 2026 AppLink · Todos os direitos reservados</span>
</div>
</body>
</html>
